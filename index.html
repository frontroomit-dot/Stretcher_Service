<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stretcher Service Dashboard - รพ.ค่ายจักรพงษ์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-main: #f8fafc;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-main);
            margin: 0; padding: 0;
            color: #334155;
        }

        header {
            background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%);
            color: white;
            padding: 40px 20px 80px;
            text-align: center;
            clip-path: ellipse(150% 100% at 50% 0%);
        }

        .header-content h1 { margin: 10px 0; font-size: 2.2rem; font-weight: 700; letter-spacing: 1px; }
        .header-content p { opacity: 0.9; font-weight: 300; }

        .container { max-width: 1300px; margin: -50px auto 40px; padding: 0 20px; }

        .filter-panel {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            align-items: end;
        }

        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { font-size: 0.85rem; font-weight: 600; color: #64748b; }
        
        select, input {
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'Sarabun';
            outline: none;
            transition: 0.3s;
        }

        select:focus, input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            transition: transform 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-5px); }
        
        .stat-icon {
            width: 55px; height: 55px;
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; margin-right: 15px;
        }

        .blue-icon { background: #eff6ff; color: #3b82f6; }
        .green-icon { background: #ecfdf5; color: #10b981; }
        .orange-icon { background: #fff7ed; color: #f59e0b; }

        .stat-info h3 { margin: 0; font-size: 0.85rem; color: #64748b; }
        .stat-info .value { font-size: 1.4rem; font-weight: 700; color: #1e293b; }

        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-container {
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            height: 350px;
        }

        .table-card {
            background: white;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            margin-bottom: 50px;
        }
        .table-header {
            padding: 20px 25px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #f8fafc; padding: 15px 20px; text-align: left; font-size: 0.9rem; color: #64748b; }
        td { padding: 15px 20px; border-bottom: 1px solid #f8fafc; font-size: 0.95rem; }
        tr:hover { background: #f1f5f9; }

        .badge-shift { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .shift-morning { background: #dcfce7; color: #166534; }
        .shift-afternoon { background: #fef9c3; color: #854d0e; }
        .shift-night { background: #f1f5f9; color: #475569; }

        /* --- Pagination Style --- */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 5px;
            background: white;
            border-top: 1px solid #f1f5f9;
        }
        .page-btn {
            padding: 8px 16px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            color: #475569;
        }
        .page-btn:hover:not(:disabled) { background: #f1f5f9; border-color: var(--accent); color: var(--accent); }
        .page-btn.active { background: var(--accent); color: white; border-color: var(--accent); font-weight: bold; }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div style="width: 3rem; height: 3rem; border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p style="margin-top: 15px; font-weight: 600;">กำลังดึงข้อมูลเรียลไทม์...</p>
</div>

<header>
    <div class="header-content">
        <i class="fas fa-ambulance fa-3x"></i>
        <h1>Dashboard ผลการปฏิบัติงานศูนย์เปล</h1>
        <p>โรงพยาบาลค่ายจักรพงษ์ มณฑลทหารบกที่ 12</p>
    </div>
</header>

<div class="container">
    <div class="filter-panel">
        <div class="filter-group">
            <label><i class="fas fa-calendar-day"></i> ช่วงเวลา</label>
            <select id="dateRange" onchange="runFilter()">
                <option value="all">ทั้งหมด</option>
                <option value="today">วันนี้</option>
                <option value="thisMonth">เดือนนี้</option>
            </select>
        </div>
        <div class="filter-group">
            <label><i class="fas fa-clock"></i> เลือกกะ (Shift)</label>
            <select id="shiftFilter" onchange="runFilter()">
                <option value="all">ทุกช่วงเวลา</option>
                <option value="morning">กะเช้า (08:00 - 16:00)</option>
                <option value="afternoon">กะบ่าย (16:00 - 00:00)</option>
                <option value="night">กะดึก (00:00 - 08:00)</option>
            </select>
        </div>
        <div class="filter-group">
            <label><i class="fas fa-search"></i> ค้นหา</label>
            <input type="text" id="searchInput" placeholder="ชื่อ/หน่วยงาน..." oninput="runFilter()">
        </div>
        <button onclick="loadData()" style="background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600;">
            <i class="fas fa-sync-alt"></i> รีเฟรชข้อมูล
        </button>
    </div>

    <div class="summary-grid">
        <div class="stat-card">
            <div class="stat-icon blue-icon"><i class="fas fa-tasks"></i></div>
            <div class="stat-info"><h3>ภารกิจที่เลือก</h3><div id="totalJobs" class="value">0</div></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon green-icon"><i class="fas fa-user-check"></i></div>
            <div class="stat-info"><h3>พลเปลดีเด่น</h3><div id="topStaff" class="value">-</div></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon orange-icon"><i class="fas fa-hospital-alt"></i></div>
            <div class="stat-info"><h3>หน่วยงานยอดนิยม</h3><div id="topDept" class="value">-</div></div>
        </div>
    </div>

    <div class="charts-row">
        <div class="chart-container">
            <h4 style="margin: 0 0 15px 0;">5 อันดับพลเปลงานเยอะ</h4>
            <canvas id="staffChart"></canvas>
        </div>
        <div class="chart-container">
            <h4 style="margin: 0 0 15px 0;">5 อันดับแผนกใช้บริการ</h4>
            <canvas id="deptChart"></canvas>
        </div>
    </div>

    <div class="table-card">
        <div class="table-header">
            <h3 style="margin:0;"><i class="fas fa-list"></i> รายละเอียดภารกิจ</h3>
            <span id="dataCount" style="font-size: 0.8rem; color: #64748b;">-</span>
        </div>
        <div class="table-wrapper">
            <table id="stretcherTable">
                <thead><tr id="tableHead"></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div id="pagination" class="pagination-container"></div>
    </div>
</div>

<script>
const sheetID = "1WkvaZaoiMqYpXcCHkSVDizqke7eHufkdMiiXSjc5tTI";
const sheetName = "Form Responses 1";
const endpoint = `https://opensheet.elk.sh/${sheetID}/${sheetName}`;

let rawData = [];
let filteredData = [];
let charts = {};
let currentPage = 1;
const rowsPerPage = 25; // แสดงหน้าละ 25 รายการ

async function loadData() {
    document.getElementById('loader').style.display = 'flex';
    try {
        const response = await fetch(endpoint);
        rawData = await response.json();
        runFilter();
    } catch (err) {
        alert("โหลดข้อมูลล้มเหลว");
    } finally {
        document.getElementById('loader').style.display = 'none';
    }
}

function getShift(timeStr) {
    if (!timeStr) return "N/A";
    const hour = parseInt(timeStr.split(':')[0]);
    if (hour >= 8 && hour < 16) return "morning";
    if (hour >= 16 && hour <= 23) return "afternoon";
    return "night";
}

function runFilter() {
    const range = document.getElementById('dateRange').value;
    const shift = document.getElementById('shiftFilter').value;
    const search = document.getElementById('searchInput').value.toLowerCase();
    const now = new Date();
    const todayStr = now.toLocaleDateString('en-GB');
    const thisMonth = now.getMonth() + 1;

    const firstRow = rawData[0] || {};
    const dK = Object.keys(firstRow).find(k => k.includes("วัน"));
    const tK = Object.keys(firstRow).find(k => k.includes("เวลา"));
    const sK = Object.keys(firstRow).find(k => k.includes("ชื่อ")) || "";
    const dpK = Object.keys(firstRow).find(k => k.includes("แผนก")) || "";

    filteredData = rawData.filter(row => {
        let mD = true;
        if (range === 'today') mD = String(row[dK]).includes(todayStr);
        if (range === 'thisMonth') mD = parseInt(String(row[dK]).split(/[\/\-]/)[1]) === thisMonth;
        let mS = (shift === 'all') || getShift(row[tK]) === shift;
        let mSearch = Object.values(row).some(v => String(v).toLowerCase().includes(search));
        return mD && mS && mSearch;
    });

    currentPage = 1; // กรองใหม่ให้เริ่มหน้า 1
    updateUI(sK, dpK, tK);
}

function updateUI(sK, dpK, tK) {
    document.getElementById('totalJobs').innerText = filteredData.length;
    document.getElementById('dataCount').innerText = `พบทั้งหมด ${filteredData.length} รายการ (หน้าละ 25)`;

    const sMap = {}, dMap = {};
    filteredData.forEach(r => {
        if(r[sK]) sMap[r[sK]] = (sMap[r[sK]] || 0) + 1;
        if(r[dpK]) dMap[r[dpK]] = (dMap[r[dpK]] || 0) + 1;
    });

    document.getElementById('topStaff').innerText = Object.keys(sMap).reduce((a, b) => sMap[a] > sMap[b] ? a : b, "-");
    document.getElementById('topDept').innerText = Object.keys(dMap).reduce((a, b) => dMap[a] > dMap[b] ? a : b, "-");

    renderCharts(sMap, dMap);
    renderTable(tK);
    renderPagination(tK);
}

function renderCharts(sMap, dMap) {
    const draw = (map, id, color) => {
        if (charts[id]) charts[id].destroy();
        const labels = Object.keys(map).sort((a,b) => map[b] - map[a]).slice(0, 5);
        charts[id] = new Chart(document.getElementById(id), {
            type: 'bar',
            data: { labels, datasets: [{ data: labels.map(l => map[l]), backgroundColor: color, borderRadius: 6 }] },
            options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    };
    draw(sMap, 'staffChart', '#3b82f6');
    draw(dMap, 'deptChart', '#10b981');
}

function renderTable(tK) {
    const head = document.getElementById('tableHead');
    const body = document.getElementById('tableBody');
    if (filteredData.length === 0) {
        body.innerHTML = "<tr><td colspan='10' style='text-align:center;'>ไม่พบข้อมูล</td></tr>";
        return;
    }

    const start = (currentPage - 1) * rowsPerPage;
    const items = filteredData.slice(start, start + rowsPerPage);
    const headers = Object.keys(filteredData[0]).filter(h => !h.includes("Timestamp"));
    
    head.innerHTML = `<th>ลำดับ</th>` + headers.map(h => `<th>${h}</th>`).join('') + `<th>ช่วงเวลา</th>`;
    body.innerHTML = items.map((row, i) => {
        const shift = getShift(row[tK]);
        const badge = shift === 'morning' ? 'shift-morning">เช้า' : (shift === 'afternoon' ? 'shift-afternoon">บ่าย' : 'shift-night">ดึก');
        return `<tr>
            <td>${start + i + 1}</td>
            ${headers.map(h => `<td>${row[h] || '-'}</td>`).join('')}
            <td><span class="badge-shift ${badge}</span></td>
        </tr>`;
    }).join('');
}

function renderPagination(tK) {
    const container = document.getElementById('pagination');
    const totalPages = Math.ceil(filteredData.length / rowsPerPage);
    container.innerHTML = "";
    if (totalPages <= 1) return;

    const btn = (text, target, disabled = false, active = false) => {
        const b = document.createElement('button');
        b.innerHTML = text;
        b.className = `page-btn ${active ? 'active' : ''}`;
        b.disabled = disabled;
        b.onclick = () => { 
            currentPage = target; 
            renderTable(tK); 
            renderPagination(tK);
            document.querySelector('.table-card').scrollIntoView({ behavior: 'smooth' });
        };
        return b;
    };

    container.appendChild(btn('<i class="fas fa-angle-left"></i>', currentPage - 1, currentPage === 1));

    for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
            container.appendChild(btn(i, i, false, i === currentPage));
        } else if (i === currentPage - 2 || i === currentPage + 2) {
            const span = document.createElement('span'); span.innerText = "..."; span.style.padding="0 5px";
            container.appendChild(span);
        }
    }

    container.appendChild(btn('<i class="fas fa-angle-right"></i>', currentPage + 1, currentPage === totalPages));
}

loadData();
</script>

</body>
</html>
